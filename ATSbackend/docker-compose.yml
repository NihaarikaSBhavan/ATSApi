services:

  api:
    build: .
    container_name: ats-api
    expose:
      - "8000"
    volumes:
      # Persist trained model files so redeployment doesn't lose them
      - model_data:/app/backend/model
      # Persist HuggingFace model cache between restarts
      - hf_cache:/root/.cache/huggingface
    environment:
      - FORCE_REGEX=${FORCE_REGEX:-0}
      - MIN_FREE_MB=${MIN_FREE_MB:-999999}
      - SLM_LOAD_TIMEOUT=${SLM_LOAD_TIMEOUT:-90}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  

volumes:
  model_data:
  hf_cache:
  certbot_certs:
  certbot_www:
