server {
    listen 80 default_server;
    server_name _;

    # Redirect all HTTP to HTTPS once you have a domain + SSL cert
    # Uncomment these two lines after running certbot:
    # return 301 https://$host$request_uri;

    # ── For initial HTTP-only deployment, proxy directly ──────────────
    include /etc/nginx/conf.d/proxy.conf;
}

