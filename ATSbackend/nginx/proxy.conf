    # File upload size — resumes and JDs can be large PDFs
    client_max_body_size 20M;

    location / {
        # 'api' is the Docker Compose service name, not localhost
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for SSE — events must reach browser immediately, not buffer
        proxy_buffering          off;
        proxy_cache              off;

        # Allow long ML pipeline runs (SLM can take 60-90s on first load)
        proxy_read_timeout       300s;
        proxy_connect_timeout    10s;
        proxy_send_timeout       300s;

        # WebSocket support (future-proof)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /nginx-health {
        return 200 'nginx ok';
        add_header Content-Type text/plain;
    }
